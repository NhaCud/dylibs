name: Build FakeCamera

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git make perl unzip clang

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos

      - name: Install iOS SDK
        run: |
          rm -rf $HOME/theos/sdks
          git clone https://github.com/theos/sdks.git $HOME/theos/sdks

      - name: Install Toolchain
        run: |
          wget https://github.com/theos/theos/releases/download/v2.4.3/toolchain-linux.tar.gz
          mkdir -p $HOME/theos/toolchain
          tar -xzf toolchain-linux.tar.gz -C $HOME/theos/toolchain

      - name: Set THEOS
        run: echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Build
        run: |
          make clean
          make package

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: FakeCamera
          path: |
            .theos/obj/debug/FakeCamera.dylib
            packages/*.deb