name: Build FakeCamera

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git make perl unzip clang

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos

      - name: Fix toolchain
        run: |
          mkdir -p $HOME/theos/toolchain/linux/iphone/bin
          ln -s /usr/bin/clang $HOME/theos/toolchain/linux/iphone/bin/clang
          ln -s /usr/bin/clang++ $HOME/theos/toolchain/linux/iphone/bin/clang++

      - name: Set THEOS
        run: echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Build
        run: |
          make clean
          make package

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: FakeCamera
          path: |
            .theos/obj/debug/FakeCamera.dylib
            packages/*.deb