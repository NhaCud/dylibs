name: Build FakeCamera

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git make perl clang unzip

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos

      - name: Install Toolchain
        run: |
          git clone https://github.com/theos/toolchain.git $HOME/theos/toolchain

      - name: Install SDKs
        run: |
          rm -rf $HOME/theos/sdks
          git clone https://github.com/theos/sdks.git $HOME/theos/sdks

      - name: Build tweak
        env:
          THEOS: $HOME/theos
          PATH: $HOME/theos/toolchain/linux/iphone/bin:$PATH
        run: |
          make clean
          make package

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: FakeCamera
          path: packages/*.deb