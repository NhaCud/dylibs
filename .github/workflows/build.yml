name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Theos
      run: |
        # Xóa thư mục cũ nếu tồn tại (FIX LỖI)
        rm -rf $HOME/theos
        # Clone Theos
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
    
    - name: Clone toolchain
      run: |
        # Xóa thư mục toolchain cũ nếu tồn tại (FIX LỖI)
        rm -rf $HOME/theos/toolchain
        # Clone toolchain mới
        git clone https://github.com/theos/toolchain.git $HOME/theos/toolchain
    
    - name: Install ldid
      run: |
        # Xóa ldid cũ nếu tồn tại
        rm -f $HOME/theos/bin/ldid
        # Download và setup ldid
        curl -LO https://github.com/theos/ldid/releases/download/v2.1.5/ldid_macosx_x86_64
        chmod +x ldid_macosx_x86_64
        mv ldid_macosx_x86_64 $HOME/theos/bin/ldid
    
    - name: Build package
      run: |
        export THEOS=$HOME/theos
        export THEOS_DEVICE_IP=localhost
        make clean
        make package