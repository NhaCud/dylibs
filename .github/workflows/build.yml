name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Theos
      run: |
        rm -rf $HOME/theos
        git clone https://github.com/theos/theos.git $HOME/theos
        cd $HOME/theos
        git submodule update --init --recursive
    
    - name: Setup Toolchain
      run: |
        rm -rf $HOME/theos/toolchain
        mkdir -p $HOME/theos/toolchain
        
        # Thử clone bằng git
        if git clone https://github.com/theos/toolchain.git $HOME/theos/toolchain-temp 2>/dev/null; then
          mv $HOME/theos/toolchain-temp/* $HOME/theos/toolchain/ 2>/dev/null || true
          rm -rf $HOME/theos/toolchain-temp
          echo "✅ Git clone successful"
        else
          echo "⚠️ Git clone failed, trying download from iOS Repo Updates..."
          # URL CHÍNH XÁC - Download từ iOS Repo Updates
          curl -L https://ios-repo-updates.com/files/toolchain.tar.gz -o /tmp/toolchain.tar.gz || \
          curl -L https://github.com/ios-repo-updates/toolchain/releases/download/latest/toolchain.tar.gz -o /tmp/toolchain.tar.gz
          
          # Kiểm tra file có phải tar.gz không
          if [ -s /tmp/toolchain.tar.gz ] && file /tmp/toolchain.tar.gz | grep -q "gzip compressed data"; then
            tar xzf /tmp/toolchain.tar.gz -C $HOME/theos/toolchain --strip-components=1
            echo "✅ Download successful"
          else
            echo "❌ Download failed - invalid file"
            # Fallback cuối: dùng toolchain có sẵn trong theos
            echo "Using built-in toolchain from theos..."
            cp -r $HOME/theos/vendor/toolchain/* $HOME/theos/toolchain/ 2>/dev/null || true
          fi
        fi
        
        # Kiểm tra kết quả
        ls -la $HOME/theos/toolchain/bin/ || echo "Toolchain bin directory not found"
    
    - name: Install ldid
      run: |
        rm -f $HOME/theos/bin/ldid
        mkdir -p $HOME/theos/bin
        curl -L https://github.com/theos/ldid/releases/download/v2.1.5/ldid_macosx_x86_64 -o $HOME/theos/bin/ldid
        chmod +x $HOME/theos/bin/ldid
    
    - name: Build package
      env:
        THEOS: $HOME/theos
      run: |
        make clean
        make package
    
    - name: Upload package
      uses: actions/upload-artifact@v4
      with:
        name: fakecamera-deb
        path: packages/*.deb